<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CompaDevis</title>
<style>
:root{--bg:#f0f1f5;--card:#fff;--tx:#1a1a2e;--tx2:#666;--tx3:#999;--brd:#e2e2e2;--acc:#c62828;--acc2:#e53935;--ok:#2E7D32;--sh:0 2px 10px rgba(0,0,0,.06);--r:10px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-tap-highlight-color:transparent}
button{font-family:inherit;cursor:pointer}input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.nav{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.3);flex-wrap:wrap}
.nav-logo{font-size:17px;font-weight:800;letter-spacing:-.5px}.nav-logo em{color:var(--acc2);font-style:normal}
.nav-sep{width:1px;height:22px;background:rgba(255,255,255,.15)}.nav-proj{font-size:11px;opacity:.7;flex:1;min-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nb{padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#fff;font-size:10px;font-weight:600;transition:all .15s;white-space:nowrap}
.nb:hover{background:rgba(255,255,255,.12)}.nb.on{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5)}
.vw{display:none;padding:16px;max-width:1400px;margin:0 auto}.vw.on{display:block}
.hero{text-align:center;padding:40px 16px 24px}.hero h1{font-size:28px;font-weight:800}.hero h1 em{color:var(--acc);font-style:normal}
.hero p{color:var(--tx2);font-size:13px;margin:4px 0}.hero .sub{color:var(--tx3);font-size:11px;margin-bottom:20px}
.hcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.hc{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);cursor:pointer;transition:all .2s;border:2px solid transparent}
.hc:hover{border-color:var(--acc)}.hc h3{font-size:14px;margin-bottom:2px}.hc .hd{font-size:10px;color:var(--tx3)}
.hc .hm{margin-top:6px;display:flex;gap:5px}.hc .ht{font-size:9px;padding:2px 6px;border-radius:8px;background:#f0f0f0;color:var(--tx2);font-weight:600}
.hc-n{border:2px dashed var(--brd);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100px;color:var(--tx3)}
.hc-n:hover{border-color:var(--acc);color:var(--acc)}.hc-n .pl{font-size:28px;font-weight:300}
.mobg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;padding:16px}.mobg.on{display:flex}
.mo{background:var(--card);border-radius:var(--r);padding:20px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.2);max-height:85vh;overflow-y:auto}
.mo h2{font-size:16px;margin-bottom:12px}.mo label{display:block;font-size:11px;font-weight:600;color:var(--tx2);margin:8px 0 3px}
.mo input,.mo textarea,.mo select{width:100%;padding:7px 10px;border:1px solid var(--brd);border-radius:6px;font-size:12px}
.mo textarea{min-height:45px;resize:vertical}
.moa{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.mob{padding:7px 14px;border-radius:6px;border:none;font-size:11px;font-weight:600;transition:all .15s}
.mob.pr{background:var(--acc);color:#fff}.mob.pr:hover{background:var(--acc2)}
.mob.ok{background:#2E7D32;color:#fff}.mob.ok:hover{background:#388E3C}
.mob.cancel{background:#e53935;color:#fff}.mob.cancel:hover{background:#c62828}
.mob.gh{background:transparent;color:var(--tx2);border:1px solid var(--brd)}.mob.gh:hover{background:#f5f5f5}
.mob.dn{background:#e53935;color:#fff}
.de-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}.de-head h2{font-size:17px}
.de-acts{display:flex;gap:5px;margin-left:auto;flex-wrap:wrap}
.dv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:14px}
.dc{background:var(--card);border-radius:var(--r);padding:12px;box-shadow:var(--sh);border-left:4px solid var(--tx3);transition:all .15s}
.dc:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}.dc h4{font-size:13px;margin-bottom:2px}.dc .di{font-size:10px;color:var(--tx3);margin-bottom:3px}
.dc .dp{font-size:18px;font-weight:800}.dc .dacts{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.dbtn{padding:3px 8px;border-radius:5px;border:1px solid var(--brd);background:#fff;font-size:9px;font-weight:600;color:var(--tx2);transition:all .15s}
.dbtn:hover{background:var(--tx);color:#fff;border-color:var(--tx)}
.dc-n{border:2px dashed var(--brd);display:flex;align-items:center;justify-content:center;min-height:90px;cursor:pointer;color:var(--tx3);border-left:none}
.dc-n:hover{border-color:var(--acc);color:var(--acc)}
.ai-btn{padding:6px 14px;border-radius:8px;border:2px solid var(--acc);background:#fff;color:var(--acc);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.ai-btn:hover{background:#fce4ec}.ai-btn.loading{background:#fce4ec;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.ai-status{background:#fff3e0;padding:6px 12px;border-radius:8px;margin-bottom:10px;font-size:11px;color:#E65100;font-weight:600}
.sec-block{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--sh);overflow:hidden}
.sec-head{padding:8px 12px;display:flex;align-items:center;gap:6px;cursor:pointer;background:#fafafa;border-bottom:1px solid #eee;user-select:none}
.sec-head .sn{font-weight:700;font-size:12px;flex:1}.sec-head .st{font-weight:700;font-size:11px;color:var(--acc)}
.sec-head .sa{font-size:9px;color:var(--tx3);transition:transform .2s}.sec-head .sa.u{transform:rotate(180deg)}
.sec-body{padding:6px;overflow-x:auto}
.pr{display:grid;grid-template-columns:42px 1.5fr 1.2fr 1fr 50px 56px 75px 48px 78px 26px;gap:3px;align-items:center;padding:3px 4px;border-bottom:1px solid #f5f5f5;font-size:10px;min-width:720px}
.pr:last-child{border-bottom:none}.pr.hd{font-weight:700;color:var(--tx3);font-size:8px;text-transform:uppercase;border-bottom:1px solid #eee;padding-bottom:5px}
.pr input,.pr select{padding:3px 5px;border:1px solid #eee;border-radius:3px;font-size:10px;width:100%}
.pr input:focus,.pr select:focus{border-color:var(--acc);outline:none}
.xb{width:20px;height:20px;border-radius:50%;border:none;background:#f5f5f5;color:#ccc;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.xb:hover{background:#e53935;color:#fff}
.add-p{padding:5px 10px;border:1px dashed var(--brd);background:transparent;border-radius:6px;font-size:9px;color:var(--tx3);width:100%;margin-top:5px;transition:all .15s}
.add-p:hover{border-color:var(--acc);color:var(--acc)}
.add-s{padding:7px;border:2px dashed var(--brd);background:transparent;border-radius:var(--r);font-size:10px;color:var(--tx3);width:100%;margin-top:6px;font-weight:600}
.add-s:hover{border-color:var(--acc);color:var(--acc)}
.cs{position:sticky;top:44px;z-index:99;background:var(--bg);padding:8px 0 5px;border-bottom:1px solid var(--brd)}
.ct-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ctc{background:var(--card);border-radius:7px;padding:5px 10px;box-shadow:var(--sh);text-align:center}
.ctc .cl{font-size:7px;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px}.ctc .cv{font-size:15px;font-weight:800}
.ctc.red{background:linear-gradient(135deg,#e53935,#c62828);color:#fff}.ctc.red .cl{color:rgba(255,255,255,.7)}.ctc.red .cv{font-size:17px}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;font-size:9px;background:var(--card);box-shadow:var(--sh)}
.chip .dot{width:6px;height:6px;border-radius:50%}.chip .cn{opacity:.6}.chip .cv2{font-weight:700}
.cg{margin-bottom:6px}.cgh{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--card);cursor:pointer;box-shadow:var(--sh);user-select:none}
.cgh.ex{border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid #eee}.cgh.co{border-radius:var(--r)}
.cgh .gl{display:flex;align-items:center;gap:6px}.cgh .gn{font-weight:700;font-size:11px}.cgh .gc{font-size:8px;color:var(--tx3)}
.cgh .gr{display:flex;align-items:center;gap:6px}.cgh .gt{font-weight:700;font-size:11px;min-width:60px;text-align:right}
.cgh .ga{font-size:8px;color:var(--tx3);transition:transform .2s}.cgh .ga.u{transform:rotate(180deg)}
.cgb{background:var(--card);border-radius:0 0 var(--r) var(--r);overflow:hidden;box-shadow:var(--sh)}
.cr{display:flex;align-items:stretch;border-bottom:1px solid #f2f2f2;transition:opacity .15s}.cr:last-child{border-bottom:none}.cr.off{opacity:.3}
.cr-ck{width:32px;display:flex;align-items:center;justify-content:center;cursor:pointer}.cr-ck:hover{background:#f8f8f8}
.ck{width:16px;height:16px;border-radius:4px;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;transition:all .12s}
.ck.on{border-color:var(--acc);background:var(--acc)}
.cr-nfo{flex:1;padding:6px 6px 6px 0;min-width:0}.cr-nm{font-size:10px;font-weight:600;line-height:1.2}.cr-nm.off{text-decoration:line-through;color:var(--tx3)}
.cr-pr{display:flex;gap:2px;padding:3px 4px 3px 0;align-items:stretch;flex-wrap:wrap}
.cp{border-radius:5px;padding:3px 6px;text-align:center;cursor:pointer;transition:all .12s;border:2px solid transparent;min-width:82px;display:flex;flex-direction:column;justify-content:center;position:relative}
.cp.dis{opacity:.15;cursor:default;pointer-events:none}.cp .ca{font-size:7px;font-weight:700;letter-spacing:.4px}
.cp .ctv{font-size:10px;font-weight:700}.cp .ch{font-size:7px;opacity:.5}
.cp.sel{box-shadow:0 2px 8px rgba(0,0,0,.1)}.cp.dim{opacity:.3}
.cp.best::after{content:'TOP';position:absolute;top:-4px;right:-2px;background:#4CAF50;color:#fff;font-size:5px;font-weight:700;padding:1px 2px;border-radius:2px}
.cp.cx0{background:#E8F5E9}.cp.cx0 .ca,.cp.cx0 .ctv{color:#2E7D32}.cp.cx0.sel{border-color:#2E7D32}
.cp.cx1{background:#E3F2FD}.cp.cx1 .ca,.cp.cx1 .ctv{color:#1565C0}.cp.cx1.sel{border-color:#1565C0}
.cp.cx2{background:#FFF3E0}.cp.cx2 .ca,.cp.cx2 .ctv{color:#E65100}.cp.cx2.sel{border-color:#E65100}
.cp.cx3{background:#F3E5F5}.cp.cx3 .ca,.cp.cx3 .ctv{color:#7B1FA2}.cp.cx3.sel{border-color:#7B1FA2}
.cp.cx4{background:#E0F7FA}.cp.cx4 .ca,.cp.cx4 .ctv{color:#00838F}.cp.cx4.sel{border-color:#00838F}
.cp.cx5{background:#FBE9E7}.cp.cx5 .ca,.cp.cx5 .ctv{color:#BF360C}.cp.cx5.sel{border-color:#BF360C}
.pbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300}.pbg.on{display:block}
.pnl{position:fixed;top:0;right:0;bottom:0;width:500px;max-width:94vw;background:var(--card);box-shadow:-4px 0 30px rgba(0,0,0,.15);z-index:301;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease}.pnl.on{transform:translateX(0)}
.pnl-h{padding:12px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--card);z-index:1}
.pnl-h h3{flex:1;font-size:14px}.pcl{width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f0;font-size:13px;display:flex;align-items:center;justify-content:center}.pcl:hover{background:var(--acc);color:#fff}
.pnl-b{padding:12px 16px}
.ps{margin-bottom:12px}.ps h4{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid #eee}
.pdet{background:#fafafa;border-radius:7px;padding:8px;margin-bottom:5px}
.pdet .pdt{display:flex;justify-content:space-between;margin-bottom:2px}.pdet .pdn{font-weight:700;font-size:11px}.pdet .pdp{font-weight:700;font-size:12px;color:var(--acc)}
.pdet .pdd{font-size:9px;color:#888;line-height:1.4;margin-bottom:2px}
.pdet .pdm{display:flex;gap:10px;font-size:9px;color:#aaa}.pdet .pdm b{color:#555}
.ptot{display:flex;justify-content:space-between;padding:7px 10px;border-radius:6px;margin-top:5px;font-weight:700;font-size:12px}
.pbar{display:flex;gap:4px;flex-wrap:wrap;margin:6px 0}
.pbtn{padding:3px 9px;border-radius:12px;border:1px solid var(--brd);background:var(--card);font-size:9px;font-weight:600;color:var(--tx2);transition:all .15s}
.pbtn:hover{background:var(--tx);color:#fff;border-color:var(--tx)}
.empty-msg{text-align:center;padding:30px;color:var(--tx3);font-size:13px}
.cfg-bar{display:flex;gap:5px;align-items:center;margin:6px 0;flex-wrap:wrap}
.cfg-card{background:var(--card);border-radius:5px;padding:4px 9px;box-shadow:var(--sh);font-size:9px;display:flex;align-items:center;gap:5px;cursor:pointer;border:1px solid transparent}
.cfg-card:hover{border-color:var(--acc)}.cfg-card .cfn{font-weight:700}.cfg-card .cfp{color:var(--acc);font-weight:700}
.settings-box{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:10px}
.settings-box h3{font-size:13px;margin-bottom:8px}.settings-box label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
.settings-box input{padding:7px 10px;border:1px solid var(--brd);border-radius:6px;font-size:12px;width:100%}
.settings-box .hint{font-size:9px;color:var(--tx3);margin-top:3px}
.install-banner{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;padding:10px 16px;border-radius:var(--r);margin-bottom:10px;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.install-banner .ib-txt{flex:1;font-size:11px}.install-banner .ib-btn{padding:5px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;font-size:10px;font-weight:600;cursor:pointer}
.install-banner .ib-btn:hover{background:rgba(255,255,255,.2)}
.hidden{display:none}
@media(max-width:600px){
  .vw{padding:8px}
  .nav{padding:8px 10px;gap:6px;flex-wrap:wrap}
  .nav-logo{font-size:15px}
  .nb{padding:4px 8px;font-size:9px}
  .nav-proj{font-size:10px;order:10;width:100%;margin-top:2px}
  .hero h1{font-size:22px}
  .hero p{font-size:12px}
  .hcards{grid-template-columns:1fr}
  .dv-grid{grid-template-columns:1fr}
  .de-head{flex-direction:column;align-items:flex-start;gap:6px}
  .de-acts{width:100%;flex-wrap:wrap}
  .ai-btn{width:100%;text-align:center;padding:10px}
  .dbtn{padding:6px 10px;font-size:10px}
  .dc{padding:14px}
  .dc .dp{font-size:20px}
  .dc .dacts{flex-wrap:wrap}
  .dc .dacts .dbtn{flex:1;min-width:70px;text-align:center}
  .sec-body{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .pr{font-size:9px;min-width:560px}
  .cp{min-width:68px}
  .pnl{width:100%}
  .pnl-b{padding:10px}
  .mo{margin:8px;max-height:90vh}
  .mobg{padding:8px}
  .cs{top:80px;padding:6px 0}
  .ct-row{flex-wrap:wrap;gap:4px}
  .ctc{padding:4px 8px}
  .ctc .cv{font-size:13px}
  .cfg-bar{flex-wrap:wrap}
  .settings-box{padding:12px}
  .settings-box input{font-size:14px;padding:10px}
  .install-banner{flex-direction:column;text-align:center}
  .cr{flex-direction:column}
  .cr-pr{flex-wrap:wrap;padding:4px}
  .cp{min-width:100px;padding:6px 8px}
  .cp .ctv{font-size:12px}
  body{padding-bottom:env(safe-area-inset-bottom)}
  .nav{padding-top:max(8px,env(safe-area-inset-top))}
}
</style>
</head>
<body>
<div class="nav" id="nav"></div>
<div id="modal-root"></div>
<div class="pbg" id="pbg" onclick="closePanel()"></div>
<div class="pnl" id="pnl"><div class="pnl-h"><h3 id="pnl-title"></h3><button class="pcl" onclick="closePanel()">&#10005;</button></div><div class="pnl-b" id="pnl-body"></div></div>
<input type="file" id="imp-pdf" class="hidden" accept=".pdf" onchange="handlePDF(event)">
<input type="file" id="imp-json" class="hidden" accept=".json" onchange="handleJSON(event)">
<div class="vw on" id="v-home"></div>
<div class="vw" id="v-devis"></div>
<div class="vw" id="v-edit"></div>
<div class="vw" id="v-compare"></div>
<div class="vw" id="v-settings"></div>
<script>
// ============================================================
// PWA - Service Worker + Install
// ============================================================
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;render()});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;render()})}}

// ============================================================
// UTILS
// ============================================================
const uid=()=>'_'+Math.random().toString(36).substr(2,9);
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmt=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
const fmt2=n=>new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2}).format(n);
const COLORS=['cx0','cx1','cx2','cx3','cx4','cx5'];
const DOTS=['#2E7D32','#1565C0','#E65100','#7B1FA2','#00838F','#BF360C'];
const BGS=['#E8F5E9','#E3F2FD','#FFF3E0','#F3E5F5','#E0F7FA','#FBE9E7'];

// ============================================================
// STORAGE
// ============================================================
function load(){try{return JSON.parse(localStorage.getItem('cdp1'))||{projects:[]}}catch(e){return{projects:[]}}}
function save(){localStorage.setItem('cdp1',JSON.stringify(DB))}
function getKey(){return localStorage.getItem('cd_api_key')||''}
function setKey(k){localStorage.setItem('cd_api_key',k)}
let DB=load(),proj=null,editDv=null,view='home',expanded={},cSel={},aiStatus='';

// ============================================================
// NAVIGATION
// ============================================================
function go(v){view=v;document.querySelectorAll('.vw').forEach(e=>e.classList.remove('on'));document.getElementById('v-'+v).classList.add('on');render()}
function openProj(id){proj=DB.projects.find(p=>p.id===id);if(!proj)return;cSel=proj._cSel||{};go('devis')}

// ============================================================
// MODAL
// ============================================================
function modal(title,fields,onOk,onDel){
  let h='<div class="mobg on"><div class="mo"><h2>'+esc(title)+'</h2>';
  fields.forEach(f=>{
    h+='<label>'+esc(f.label)+'</label>';
    if(f.type==='textarea')h+='<textarea id="mf_'+f.key+'" placeholder="'+esc(f.ph||'')+'">'+esc(f.val||'')+'</textarea>';
    else h+='<input id="mf_'+f.key+'" value="'+esc(f.val||'')+'" placeholder="'+esc(f.ph||'')+'" type="'+(f.type||'text')+'">';
  });
  h+='<div class="moa">';
  if(onDel)h+='<button class="mob dn" id="modl">Supprimer</button><span style="flex:1"></span>';
  h+='<button class="mob cancel" onclick="clMo()">Annuler</button><button class="mob ok" id="mook">Enregistrer</button></div></div></div>';
  document.getElementById('modal-root').innerHTML=h;
  document.getElementById('mook').onclick=()=>{let v={};fields.forEach(f=>v[f.key]=document.getElementById('mf_'+f.key).value);onOk(v);clMo()};
  if(onDel)document.getElementById('modl').onclick=()=>{onDel();clMo()};
  // Focus first field
  setTimeout(()=>{let el=document.getElementById('mf_'+fields[0].key);if(el)el.focus()},100);
}
function clMo(){document.getElementById('modal-root').innerHTML=''}

// ============================================================
// PANEL
// ============================================================
function openPanel(t,h){document.getElementById('pnl-title').textContent=t;document.getElementById('pnl-body').innerHTML=h;document.getElementById('pbg').classList.add('on');document.getElementById('pnl').classList.add('on')}

  try{
    let resp=await fetch('https://api.mistral.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'mistral-small-latest',
        temperature:0.3,
        messages:[{role:'user',content:'Tu es un expert en estimation de travaux de renovation en France. Analyse ce devis et compare chaque poste aux prix moyens du marche pour la region Aisne/Picardie (zone semi-rurale).\n\nPour CHAQUE poste, donne:\n1. Le prix du devis\n2. La fourchette prix marche (bas - haut) pour ce type de prestation\n3. Un verdict: BON PRIX / CORRECT / CHER / TRES CHER\n4. Un commentaire court si necessaire\n\nPuis donne:\n- Une note globale du devis sur 10 (rapport qualite/prix)\n- Les postes a negocier en priorite\n- Les points de vigilance\n- Un avis general\n\nReponds en HTML structure avec des couleurs:\n- Vert (#2E7D32) pour BON PRIX\n- Orange (#E65100) pour CORRECT\n- Rouge (#c62828) pour CHER/TRES CHER\n\nUtilise des <div>, <table>, <span style="color:...">, etc. Pas de markdown. Fais un rendu visuel clair et lisible.\n\nVoici le devis:\n\n'+summary}]
      })});
    if(!resp.ok){let err=await resp.text();throw new Error('Mistral API '+resp.status+': '+err.substring(0,200))}
    let data=await resp.json();
    let html=data.choices[0].message.content||'';

// Load pdf.js dynamically
let pdfJsLoaded=false;
function loadPdfJs(){return new Promise((resolve,reject)=>{
  if(pdfJsLoaded){resolve();return}
  let s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload=()=>{pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';pdfJsLoaded=true;resolve()};
  s.onerror=()=>reject(new Error('Impossible de charger pdf.js'));
  document.head.appendChild(s)})}

// Load Tesseract.js dynamically
let tessLoaded=false;
function loadTesseract(){return new Promise((resolve,reject)=>{
  if(tessLoaded){resolve();return}
  let s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
  s.onload=()=>{tessLoaded=true;resolve()};
  s.onerror=()=>reject(new Error('Impossible de charger Tesseract.js'));
  document.head.appendChild(s)})}

async function extractPdfText(file,statusCb){
  await loadPdfJs();
  let arrayBuf=await file.arrayBuffer();
  let pdf=await pdfjsLib.getDocument({data:new Uint8Array(arrayBuf)}).promise;
  let allText='';
  // Try text extraction first
  for(let i=1;i<=pdf.numPages;i++){
    let page=await pdf.getPage(i);
    let content=await page.getTextContent();
    let vp=page.getViewport({scale:1});
    let lines=[];
    content.items.forEach(item=>{
      if(!item.str||!item.str.trim())return;
      let y=Math.round(vp.height-item.transform[5]);
      let x=Math.round(item.transform[4]);
      let found=false;
      for(let l of lines){if(Math.abs(l.y-y)<4){l.items.push({x,t:item.str.trim()});found=true;break}}
      if(!found)lines.push({y,items:[{x,t:item.str.trim()}]})});
    lines.sort((a,b)=>a.y-b.y);
    lines.forEach(l=>{
      l.items.sort((a,b)=>a.x-b.x);
      let lineText='';
      l.items.forEach((item,idx)=>{
        if(idx>0){let gap=item.x-(l.items[idx-1].x+l.items[idx-1].t.length*5);
          lineText+=gap>50?' .......... ':gap>15?'   ':' '}
        lineText+=item.t});
      allText+=lineText+'\n'});
    allText+='\n'}
  // Check if text extraction worked (>50 meaningful chars)
  let cleanCheck=allText.replace(/[\s\n\r\f]/g,'');
  if(cleanCheck.length>50){return allText}
  // FALLBACK: OCR for scanned PDFs
  if(statusCb)statusCb('PDF scanne detecte, lancement OCR...');
  await loadTesseract();
  allText='';
  let worker=await Tesseract.createWorker('fra',1,{logger:m=>{
    if(m.status==='recognizing text'&&statusCb){
      statusCb('OCR page en cours... '+(Math.round((m.progress||0)*100))+'%')}}});
  for(let i=1;i<=pdf.numPages;i++){
    if(statusCb)statusCb('OCR page '+i+'/'+pdf.numPages+'...');
    let page=await pdf.getPage(i);
    let scale=2;// higher = better OCR quality
    let vp=page.getViewport({scale});
    let canvas=document.createElement('canvas');
    canvas.width=vp.width;canvas.height=vp.height;
    let ctx=canvas.getContext('2d');
    await page.render({canvasContext:ctx,viewport:vp}).promise;
    let dataUrl=canvas.toDataURL('image/png');
    let {data}=await worker.recognize(dataUrl);
    allText+='--- Page '+i+' ---\n'+data.text+'\n\n'}
  await worker.terminate();
  return allText}

async function handlePDF(e){
  let file=e.target.files[0];if(!file)return;e.target.value='';
  let key=getKey();
  if(!key){alert('Configure ta cle API Mistral dans les Parametres d\'abord !');go('settings');return}
  aiStatus='Extraction du texte PDF...';render();
  try{
    let pdfText=await extractPdfText(file,msg=>{aiStatus=msg;render()});
    if(!pdfText||pdfText.length<50)throw new Error('Le PDF semble vide ou illisible. Essayez un autre fichier.');
    // Truncate if too long (Mistral context limit)
    if(pdfText.length>30000)pdfText=pdfText.substring(0,30000)+'... [tronque]';
    aiStatus='Analyse IA en cours (Mistral)...';render();
    let resp=await fetch('https://api.mistral.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'mistral-large-latest',
        temperature:0.1,
        response_format:{type:'json_object'},
        messages:[{role:'user',content:'Tu es un expert en analyse de devis de travaux/renovation francais. Voici le texte extrait d\'un devis PDF.\n\nReponds UNIQUEMENT avec du JSON valide (pas de texte, pas de backticks).\n\nSi le PDF contient PLUSIEURS devis distincts (numeros differents), retourne un TABLEAU JSON: [{devis1},{devis2},...]\nSi UN seul devis, retourne un objet JSON simple.\n\nFormat pour chaque devis:\n{"name":"Nom entreprise","ref":"Numero du devis","date":"YYYY-MM-DD","labels":"Labels RGE ou vide","garantie":"","paiement":"Conditions reglement","note":"Remarques importantes du devis","sections":[{"name":"Nom section/lot","postes":[{"ref":"","nom":"Designation","desc":"Detail materiaux/MO","qte":25,"unite":"m2","pu":45.00,"tva":10}]}]}\n\nRegles CRITIQUES pour les QUANTITES et PRIX:\n- qte = la VRAIE quantite indiquee dans le devis (m2, ml, nombre, heures, etc.)\n- pu = le PRIX UNITAIRE HT (pas le total de la ligne !)\n- Le total d\'une ligne = qte x pu. Par exemple: "Carrelage 25 m2 x 45 EUR = 1125 EUR" -> qte=25, unite=m2, pu=45\n- Si le devis indique "3 fenetres x 850 EUR = 2550 EUR" -> qte=3, unite=u, pu=850\n- UNIQUEMENT si c\'est un forfait global sans detail quantite/PU -> qte=1, unite=fft, pu=montant total HT\n- NE METS PAS qte=1 et pu=total de la ligne si le devis donne un detail quantite x prix unitaire !\n- Cherche les colonnes: Designation | Quantite | Unite | PU HT | Total HT\n\nAutres regles:\n- TVA: regarde le taux dans le devis (5.5%, 10% ou 20%)\n- MONTANT HT TOTAL et MONTANT TTC = totaux de verification, NE PAS les mettre comme postes\n- Sois EXHAUSTIF: chaque ligne avec un prix doit devenir un poste\n- Sections = regroupements par type de travaux ou par zone\n\nTexte du devis:\n\n'+pdfText}]
      })});
    if(!resp.ok){let err=await resp.text();throw new Error('Mistral API '+resp.status+': '+err.substring(0,300))}
    let data=await resp.json();
    let text=data.choices[0].message.content||'';
    let clean=text.replace(/```json|```/g,'').trim();
    let parsed=JSON.parse(clean);
    // Handle array (multiple devis in one PDF) or single object
    let devisList=Array.isArray(parsed)?parsed:[parsed];
    let totalImported=0;
    devisList.forEach(res=>{
      let d={id:uid(),name:res.name||'Import PDF',ref:res.ref||file.name,date:res.date||'',labels:res.labels||'',garantie:res.garantie||'',paiement:res.paiement||'',note:res.note||'',
        sections:(res.sections||[]).map(s=>({id:uid(),name:s.name||'Section',postes:(s.postes||[]).map(p=>({id:uid(),ref:p.ref||'',nom:p.nom||'',desc:p.desc||'',qte:p.qte||1,unite:p.unite||'u',pu:p.pu||0,tva:p.tva||10}))}))};
      proj.devis.push(d);totalImported++});
    invalidateAIGroups();save();
    let lastD=proj.devis[proj.devis.length-1];let t=dvTotal(lastD);let np=lastD.sections.reduce((a,s)=>a+s.postes.length,0);
    if(totalImported>1)aiStatus='OK ! '+totalImported+' devis importes depuis ce PDF';
    else aiStatus='OK ! '+lastD.name+' - '+fmt(t.ttc)+' TTC ('+np+' postes)';
    render();setTimeout(()=>{aiStatus='';render()},4000);
  }catch(err){aiStatus='Erreur: '+err.message;render();setTimeout(()=>{aiStatus='';render()},6000)}
}

// Build a signature key for a poste to match with saved tradeMap
function posteKey(devisName,nom){return(devisName+'||'+nom).toLowerCase().trim()}

function upCat(devisName,nom,val){
  if(!proj._tradeMap)proj._tradeMap={};
  let pk=posteKey(devisName,nom);
  if(val==='__new__'){
    let newCat=prompt('Nom de la nouvelle categorie :');
    if(!newCat)return render();
    proj._tradeMap[pk]=newCat.trim();
  }else if(val){proj._tradeMap[pk]=val}
  else{delete proj._tradeMap[pk]}
  save();render()
}

// Build flat poste list from project
function buildAllPostes(){
  let all=[];
  proj.devis.forEach((d,di)=>d.sections.forEach(s=>s.postes.forEach(p=>{
    let tot=(p.qte||0)*(p.pu||0);
    all.push({idx:all.length,devis:d.name,devisRef:d.ref||'',section:s.name,nom:p.nom||'',desc:p.desc||'',qte:p.qte||0,unite:p.unite||'',pu:p.pu||0,total:Math.round(tot),
      key:posteKey(d.name,p.nom||'')})})));
  return all}

// Build full inventory text
function buildInventoryText(){
  let inv='';
  proj.devis.forEach((d,i)=>{
    let t=dvTotal(d);
    inv+='\n========================================\n';
    inv+='DEVIS '+(i+1)+': '+d.name+(d.ref?' ('+d.ref+')':'')+'\n';
    inv+='Date: '+(d.date||'?')+' | Labels: '+(d.labels||'aucun')+'\n';
    inv+='Total HT: '+Math.round(t.ht)+' EUR | Total TTC: '+Math.round(t.ttc)+' EUR\n';
    if(d.paiement)inv+='Paiement: '+d.paiement+'\n';
    if(d.note)inv+='Note: '+d.note+'\n';
    inv+='----------------------------------------\n';
    d.sections.forEach(s=>{
      let st=0;s.postes.forEach(p=>st+=(p.qte||0)*(p.pu||0));
      inv+='  ['+s.name+'] ('+Math.round(st)+' EUR HT)\n';
      s.postes.forEach(p=>{
        let tot=(p.qte||0)*(p.pu||0);
        inv+='    - '+p.nom+(p.desc?' | '+p.desc:'');
        inv+=' | Qte:'+(p.qte||0)+' '+(p.unite||'')+' | PU:'+(p.pu||0)+' | Total:'+Math.round(tot)+' EUR HT\n'})})});
  if(inv.length>28000)inv=inv.substring(0,28000)+'\n... [tronque]';
  return inv}

async function globalSynthesis(){
  if(!proj||proj.devis.length<2){alert('Il faut au moins 2 devis pour la synthese');return}
  let key=getKey();
  if(!key){alert('Configure ta cle API Mistral dans les Parametres');go('settings');return}
  let allPostes=buildAllPostes();
  let tradeMap=proj._tradeMap||{}; // saved classifications: {posteKey: "Corps de metier"}
  // Split postes: already classified vs new
  let classified={};let newPostes=[];
  allPostes.forEach(p=>{
    if(tradeMap[p.key]){let cat=tradeMap[p.key];if(!classified[cat])classified[cat]=[];classified[cat].push(p)}
    else{newPostes.push(p)}});
  // If all postes already classified, skip to step 2
  if(newPostes.length===0){
    let cats=Object.entries(classified).map(([name,postes])=>({name,postes:postes.map(p=>p.idx)}));
    await runSynthesisStep2(cats,allPostes,buildInventoryText());return}
  // STEP 1: Classify new postes via Mistral
  let posteList='';
  newPostes.forEach(p=>posteList+='['+p.idx+'] '+p.devis+' | '+p.section+' | '+p.nom+(p.desc?' ('+p.desc.substring(0,50)+')':'')+' = '+p.total+' EUR HT\n');
  if(posteList.length>20000)posteList=posteList.substring(0,20000)+'\n...[tronque]';
  // Include existing categories as hint
  let existingCats=Object.keys(classified);
  let catHint=existingCats.length?'\n\nCategories deja utilisees dans ce projet (reutilise-les si possible): '+existingCats.join(', '):'';
  openPanel('Synthese - Etape 1/2 : Classification',
    '<div style="padding:30px;text-align:center">'
    +'<div style="font-size:24px;margin-bottom:12px">&#9203;</div>'
    +'<div id="syn-step" style="font-size:12px;font-weight:600;color:var(--tx);margin-bottom:10px">Classification de '+newPostes.length+' nouveaux postes...</div>'
    +'<div style="background:#e2e2e2;border-radius:10px;height:14px;overflow:hidden;margin-bottom:6px">'
    +'<div id="syn-bar" style="background:linear-gradient(90deg,#1565C0,#0f3460);height:100%;border-radius:10px;width:10%;transition:width 0.5s ease"></div></div>'
    +'<div id="syn-pct" style="font-size:10px;color:var(--tx3)">10%</div>'
    +'</div>');
  let classTimer=setInterval(()=>{
    let el=document.getElementById('syn-bar');let elP=document.getElementById('syn-pct');
    if(el){let w=parseInt(el.style.width)||10;if(w<45){el.style.width=(w+5)+'%';if(elP)elP.textContent=(w+5)+'%'}}
  },3000);
  try{
    let resp1=await fetch('https://api.mistral.ai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({
        model:'mistral-large-latest',temperature:0.1,response_format:{type:'json_object'},
        messages:[{role:'user',content:'Tu es un metreur expert en renovation. Classe chaque poste ci-dessous dans un corps de metier.\n\nPostes a classer:\n'+posteList+catHint+'\n\nReponds en JSON strict:\n{"categories":[{"name":"Nom du corps de metier","postes":[0,3,7]}],"ambiguous":[{"idx":5,"nom":"nom du poste","reason":"Pourquoi ce poste est ambigu","suggestions":["Categorie A","Categorie B"]}]}\n\nRegles:\n- Corps de metier courants: Demolition/Depose, Gros oeuvre, Couverture/Toiture, Charpente, Electricite, Plomberie/Sanitaire, Chauffage, VMC/Ventilation, Isolation/Placo, Carrelage/Faience, Peinture, Menuiseries exterieures, Menuiseries interieures, Revetement sol, Maconnerie\n- Toiture/couverture/tuiles/ardoise/zinguerie/faitage -> Couverture/Toiture\n- Mets dans "ambiguous" les postes que tu ne peux PAS classer avec certitude\n- Chaque poste dans UNE seule categorie OU dans ambiguous\n- Reutilise les noms de categories existantes si possible'}]
      })});
    clearInterval(classTimer);
    if(!resp1.ok){let err=await resp1.text();throw new Error('Mistral: '+resp1.status+': '+err.substring(0,200))}
    let data1=await resp1.json();
    let text1=data1.choices[0].message.content||'';
    let classResult=JSON.parse(text1.replace(/```json|```/g,'').trim());
    let aiCategories=classResult.categories||[];
    let ambiguous=classResult.ambiguous||[];
    // Merge AI categories with already-classified
    let mergedCats={};
    Object.entries(classified).forEach(([name,postes])=>{mergedCats[name]=postes.map(p=>p.idx)});
    aiCategories.forEach(c=>{
      if(!mergedCats[c.name])mergedCats[c.name]=[];
      (c.postes||[]).forEach(idx=>mergedCats[c.name].push(idx))});
    let catArray=Object.entries(mergedCats).map(([name,postes])=>({name,postes}));
    // Store for later use
    window._synCats=catArray;window._synAmb=ambiguous;window._synAllPostes=allPostes;window._synInv=buildInventoryText();
    // If ambiguous postes, show validation UI
    if(ambiguous.length>0){showAmbiguousUI();return}
    // No ambiguous -> save tradeMap and go to step 2
    saveTradeMap(catArray,allPostes);
    await runSynthesisStep2(catArray,allPostes,window._synInv);
  }catch(err){clearInterval(classTimer);
    document.getElementById('pnl-body').innerHTML='<div style="color:#c62828;padding:20px">Erreur: '+esc(err.message)+'</div>'}
}

function saveTradeMap(cats,allPostes){

    let p=allPostes[idx];if(p)tm[p.key]=c.name}));

function validateAmbiguous(){
  let cats=window._synCats;let amb=window._synAmb;let ap=window._synAllPostes;
  amb.forEach((a,i)=>{
    let newCat=document.getElementById('amb_new_'+i);
    let chosen=(newCat&&newCat.value.trim())?newCat.value.trim():document.getElementById('amb_'+i).value;
    let existing=cats.find(c=>c.name===chosen);
    if(existing){existing.postes.push(a.idx)}
    else{cats.push({name:chosen,postes:[a.idx]})}});

  saveTradeMap(cats,ap);

async function exportSynthesisXLS(){
  if(!proj||proj.devis.length<2){alert('Il faut au moins 2 devis');return}
  let tm=proj._tradeMap||{};
  let allPostes=buildAllPostes();
  let byTrade={};let unclassified=[];
  allPostes.forEach(p=>{
    let cat=tm[p.key];
    if(cat){if(!byTrade[cat])byTrade[cat]=[];byTrade[cat].push(p)}
    else{unclassified.push(p)}});
  if(Object.keys(byTrade).length===0){alert('Lancez d\'abord une Synthese globale pour classifier les postes par corps de metier.');return}
  await loadSheetJS();
  let wb=XLSX.utils.book_new();
  let devisNames=[...new Set(proj.devis.map(d=>d.name))];
  // --- Sheet 1: Comparatif ---
  let rows1=[['Corps de metier','Poste',...devisNames.map(n=>n+' (HT)'),'Ecart','Moins cher']];
  let grandTotals={};devisNames.forEach(n=>grandTotals[n]=0);
  Object.keys(byTrade).sort().forEach(trade=>{
    let postes=byTrade[trade];
    let tradeTotals={};devisNames.forEach(n=>tradeTotals[n]=0);
    postes.forEach(p=>tradeTotals[p.devis]=(tradeTotals[p.devis]||0)+p.total);
    devisNames.forEach(n=>grandTotals[n]+=(tradeTotals[n]||0));
    let vals=devisNames.map(n=>tradeTotals[n]||0).filter(v=>v>0);
    let ecart=vals.length>1?Math.max(...vals)-Math.min(...vals):0;
    let best=devisNames.reduce((a,b)=>{
      let va=tradeTotals[a]||Infinity,vb=tradeTotals[b]||Infinity;
      return va>0&&va<vb?a:(vb>0?b:a)});
    rows1.push([trade,'',...devisNames.map(n=>tradeTotals[n]||0),ecart,tradeTotals[best]?best:'-']);
    let posteNames=[...new Set(postes.map(p=>p.nom))];
    posteNames.forEach(pn=>{
      let row=['',pn];
      devisNames.forEach(n=>{let v=postes.filter(p=>p.nom===pn&&p.devis===n).reduce((a,p)=>a+p.total,0);row.push(v||'')});
      row.push('','');rows1.push(row)})});
  rows1.push(['TOTAL','',...devisNames.map(n=>grandTotals[n]),'','']);
  let ws1=XLSX.utils.aoa_to_sheet(rows1);
  // Set column widths
  ws1['!cols']=[{wch:25},{wch:35},...devisNames.map(()=>({wch:18})),{wch:12},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws1,'Comparatif');
  // --- Sheet 2: Detail postes ---
  let rows2=[['Devis','Section','Categorie','Poste','Description','Qte','Unite','PU HT','Total HT']];
  allPostes.forEach(p=>{
    let cat=tm[p.key]||'Non classe';
    rows2.push([p.devis,p.section,cat,p.nom,p.desc,p.qte,p.unite,p.pu,p.total])});
  let ws2=XLSX.utils.aoa_to_sheet(rows2);
  ws2['!cols']=[{wch:18},{wch:20},{wch:20},{wch:30},{wch:35},{wch:8},{wch:8},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'Detail postes');
  // --- Sheet 3: Totaux par artisan ---
  let rows3=[['Artisan','Total HT','TVA','Total TTC','Nb postes','Labels','Paiement']];
  proj.devis.forEach(d=>{
    let t=dvTotal(d);let np=d.sections.reduce((a,s)=>a+s.postes.length,0);
    rows3.push([d.name,Math.round(t.ht),Math.round(t.tv),Math.round(t.ttc),np,d.labels||'',d.paiement||''])});
  let ws3=XLSX.utils.aoa_to_sheet(rows3);
  ws3['!cols']=[{wch:20},{wch:12},{wch:10},{wch:12},{wch:10},{wch:20},{wch:25}];
  XLSX.utils.book_append_sheet(wb,ws3,'Totaux artisans');
  // --- Sheet 4: Non classes ---
  if(unclassified.length){
    let rows4=[['Devis','Section','Poste','Description','Total HT']];
    unclassified.forEach(p=>rows4.push([p.devis,p.section,p.nom,p.desc,p.total]));
    let ws4=XLSX.utils.aoa_to_sheet(rows4);
    ws4['!cols']=[{wch:18},{wch:20},{wch:30},{wch:35},{wch:12}];
    XLSX.utils.book_append_sheet(wb,ws4,'Non classes')}
  // Download
  let fname=(proj.name||'synthese').replace(/[^a-zA-Z0-9]/g,'_')+'_synthese.xlsx';
  XLSX.writeFile(wb,fname)}

// ============================================================
// COMPARATOR
// ============================================================
function norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim()}
function sim(a,b){if(!a||!b)return 0;let wa=a.split(' '),wb=b.split(' ');return wa.filter(w=>wb.some(w2=>w2.includes(w)||w.includes(w2))).length/Math.max(wa.length,wb.length)}
// AI-powered grouping
let aiGroupsCache=null;let aiGroupsLoading=false;
function invalidateAIGroups(){if(proj){proj._aiGroups=null;save()}}

function buildCompFromCache(){
  // Use cached AI groups if available
  if(!proj||!proj.devis.length)return[];
  if(proj._aiGroups&&proj._aiGroups.length)return proj._aiGroups;
  // Fallback: simple grouping (no AI)
  return buildCompSimple()}

function buildCompSimple(){if(!proj||!proj.devis.length)return[];let all=[];
  proj.devis.forEach((d,di)=>d.sections.forEach(s=>all.push({did:d.id,di,dn:d.name+(d.ref?' - '+d.ref:''),sid:s.id,sn:s.name,nr:norm(s.name),ps:s.postes,labels:d.labels,garantie:d.garantie,paiement:d.paiement,note:d.note})));
  let gs=[],used=new Set();
  all.forEach((s,i)=>{if(used.has(i))return;let g={id:'cg'+i,name:s.sn,opts:[s]};used.add(i);
    all.forEach((s2,j)=>{if(!used.has(j)&&s2.did!==s.did&&sim(s.nr,s2.nr)>0.4){g.opts.push(s2);used.add(j)}});gs.push(g)});return gs}

        temperature:0.1,
        response_format:{type:'json_object'},
        messages:[{role:'user',content:'Tu es un expert en comparaison de devis de travaux de renovation. Voici la liste de TOUS les postes de plusieurs devis pour le MEME chantier.\n\nChaque ligne = [index] Artisan | Section | Poste (detail) = prix HT\n\n'+inventory+'\n\nTon objectif: regrouper les postes de DIFFERENTS artisans qui couvrent le MEME travail specifique.\n\nRegles STRICTES:\n- Chaque groupe = UN type de travail precis et specifique\n- Ne regroupe QUE les postes qui font exactement le meme travail chez differents artisans\n- Exemples de BONS groupes: "Demolition / depose", "Pose de carrelage sol", "Pose de faience murale", "Fourniture et pose de velux", "Fourniture et pose de fenetres", "Electricite", "VMC", "Plomberie sanitaire", "Isolation / Placo", "Chape / regreage", "Parquet", "Peinture", "Rebouchage murs"\n- Exemples de MAUVAIS groupes: "Finitions interieures" (trop vague), "Travaux divers" (trop vague)\n- Si 2 postes de 2 artisans differents font le meme travail -> meme groupe\n- Si un poste est unique a un artisan -> il est SEUL dans son groupe\n- Ne melange JAMAIS carrelage+velux, demolition+isolation, plomberie+electricite, etc.\n- Prefere 20 petits groupes precis plutot que 5 gros groupes vagues\n\nReponds en JSON:\n{"groups":[{"name":"Nom precis et court","postes":[0,5,12]}]}\n\nOu les nombres sont les index [X] des postes.'}]
      })});
    if(!resp.ok){let err=await resp.text();throw new Error('Mistral: '+resp.status)}
    let data=await resp.json();
    let text=data.choices[0].message.content||'';
    let clean=text.replace(/```json|```/g,'').trim();
    let result=JSON.parse(clean);
    // Build groups: merge postes from same devis within a group into one opt
    let gs=[];
    (result.groups||[]).forEach((g,gi)=>{
      let postesByDevis={};
      (g.postes||[]).forEach(idx=>{
        let p=allPostes[idx];if(!p)return;
        let key2=p.did;
        if(!postesByDevis[key2])postesByDevis[key2]={did:p.did,di:p.di,dn:p.dn,sid:p.sid,sn:p.sn,ps:[],labels:p.labels,garantie:p.garantie,paiement:p.paiement,note:p.note};
        postesByDevis[key2].ps.push(...p.ps)});
      let opts=Object.values(postesByDevis);
      if(opts.length)gs.push({id:'ai'+gi,name:g.name||'Groupe '+(gi+1),opts})});
    // Add any postes not in any group
    let usedIdx=new Set();
    (result.groups||[]).forEach(g=>(g.postes||[]).forEach(idx=>usedIdx.add(idx)));
    allPostes.forEach((p,i)=>{
      if(!usedIdx.has(i)){
        gs.push({id:'ai_solo_'+i,name:(p.ps[0]?.nom||p.sn||'Poste'),opts:[{did:p.did,di:p.di,dn:p.dn,sid:p.sid,sn:p.sn,ps:p.ps,labels:p.labels,garantie:p.garantie,paiement:p.paiement,note:p.note}]})}});
    proj._aiGroups=gs;save();
    aiGroupsLoading=false;cSel={};proj._cSel={};render();
  }catch(err){aiGroupsLoading=false;alert('Erreur regroupement IA: '+err.message);render()}
}

function resetAIGroups(){proj._aiGroups=null;cSel={};proj._cSel={};save();buildCompAI(true)}
function oTot(ps){let ht=0,tv=0;(ps||[]).forEach(p=>{let t=(p.qte||0)*(p.pu||0);ht+=t;tv+=t*(p.tva||0)/100});return{ht,tv,ttc:ht+tv}}
function compTotals(){let gs=buildCompFromCache(),tH=0,tV=0,byA={},cnt=0;
  gs.forEach(g=>{let s=cSel[g.id];if(!s||!s.on)return;let o=g.opts[s.ch]||g.opts[0];if(!o)return;
    let t=oTot(o.ps);tH+=t.ht;tV+=t.tv;cnt++;let nm=o.dn.split(' - ')[0];byA[nm]=(byA[nm]||0)+t.ht});
  return{ht:tH,tv:tV,ttc:tH+tV,byA,cnt,total:gs.length}}
function tglC(gid){cSel[gid]=cSel[gid]||{on:true,ch:0};cSel[gid].on=!cSel[gid].on;proj._cSel=cSel;save();render()}
function chC(gid,ci){cSel[gid]=cSel[gid]||{};cSel[gid].ch=ci;cSel[gid].on=true;proj._cSel=cSel;save();render()}
function tglCS(s){expanded['c_'+s]=expanded['c_'+s]===false?true:false;render()}
function cPre(m){buildCompFromCache().forEach(g=>{cSel[g.id]=cSel[g.id]||{on:true,ch:0};cSel[g.id].on=m==='all'});proj._cSel=cSel;save();render()}

function showDet(gname,optIdx,gid){

  if(key)h+='<div style="font-size:11px;margin-bottom:6px;color:var(--ok)">&#10003; Cle configuree: <code>'+masked+'</code></div>';
  h+='<label>Cle API Mistral</label><input id="api-key-input" type="password" value="'+esc(key)+'" placeholder="votre cle API Mistral...">';
  h+='<div class="hint">1. Va sur <a href="https://console.mistral.ai" target="_blank">console.mistral.ai</a><br>2. Cree un compte (email ou Google)<br>3. Menu gauche &rarr; <b>API Keys</b><br>4. Clique <b>Create new key</b><br>5. Copie-colle la cle ici</div>';
  h+='<button class="mob pr" style="margin-top:8px" onclick="setKey(document.getElementById(\'api-key-input\').value);render()">Sauvegarder</button></div>';
  // Install
  if(deferredPrompt){h+='<div class="settings-box"><h3>&#128241; Installer l\'application</h3>';
    h+='<p style="font-size:11px;color:var(--tx2);margin-bottom:8px">Installez CompaDevis sur votre ecran d\'accueil pour un acces rapide et le mode hors-ligne.</p>';
    h+='<button class="mob pr" onclick="installApp()">Installer</button></div>'}
  // Data
  h+='<div class="settings-box"><h3>&#128190; Donnees</h3>';
  h+='<p style="font-size:11px;color:var(--tx2);margin-bottom:8px">'+DB.projects.length+' projet(s) | Donnees stockees dans votre navigateur (localStorage)</p>';
  h+='<button class="dbtn" onclick="if(confirm(\'Tout supprimer ?\')){localStorage.removeItem(\'cdp1\');DB={projects:[]};proj=null;go(\'home\')}">Reinitialiser toutes les donnees</button>';
  if(proj&&proj._tradeMap&&Object.keys(proj._tradeMap).length){
    h+='<div style="margin-top:8px;font-size:10px;color:var(--tx3)">'+Object.keys(proj._tradeMap).length+' classifications de postes memorisees</div>';
    h+='<button class="dbtn" onclick="resetTradeMap()" style="margin-top:4px">Reinitialiser les classifications par corps de metier</button>'}
  h+='</div>';
  document.getElementById('v-settings').innerHTML=h}

// ============================================================
// INIT
// ============================================================
render();
</script>
